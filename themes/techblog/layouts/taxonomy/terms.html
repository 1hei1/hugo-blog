{{ define "main" }}
<div class="container">
  <h1 class="page-title">{{ .Title }}</h1>
  <div class="terms-grid">
    {{ range .Pages }}
    <div class="term-item">
      <a href="{{ .Permalink }}">{{ .Title }}</a>
      <span class="count">({{ len .Pages }})</span>
    </div>
    {{ end }}
  </div>
</div>
{{ end }}
